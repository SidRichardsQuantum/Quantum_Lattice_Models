<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">Haldane honeycomb hopping convention</title>
  <desc id="desc">Honeycomb A and B sublattices with real nearest-neighbor hopping and directed complex next-nearest-neighbor hopping.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#d55e00"/>
    </marker>
    <style>
      .nn{stroke:#3f4854;stroke-width:7;stroke-linecap:round}
      .nnn{stroke:#d55e00;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .a{fill:#0072b2}.b{fill:#e69f00}
      .label{font:21px sans-serif;fill:#20242a}.note{font:18px sans-serif;fill:#4b5563}
    </style>
  </defs>
  <rect width="900" height="430" fill="#fff"/>
  <g class="nn">
    <line x1="250" y1="100" x2="390" y2="180"/><line x1="390" y1="180" x2="250" y2="260"/>
    <line x1="250" y1="260" x2="110" y2="180"/><line x1="110" y1="180" x2="250" y2="100"/>
    <line x1="390" y1="180" x2="530" y2="100"/><line x1="390" y1="180" x2="530" y2="260"/>
    <line x1="530" y1="100" x2="670" y2="180"/><line x1="670" y1="180" x2="530" y2="260"/>
  </g>
  <g class="nnn">
    <path d="M250 100 Q390 65 530 100"/><path d="M530 100 Q690 115 670 180"/>
    <path d="M670 180 Q690 245 530 260"/><path d="M530 260 Q390 300 250 260"/>
    <path d="M250 260 Q90 245 110 180"/><path d="M110 180 Q90 115 250 100"/>
  </g>
  <g>
    <circle class="a" cx="250" cy="100" r="23"/><circle class="b" cx="390" cy="180" r="23"/>
    <circle class="a" cx="250" cy="260" r="23"/><circle class="b" cx="110" cy="180" r="23"/>
    <circle class="a" cx="530" cy="100" r="23"/><circle class="a" cx="530" cy="260" r="23"/>
    <circle class="b" cx="670" cy="180" r="23"/>
  </g>
  <text class="label" x="242" y="108" fill="#fff">A</text><text class="label" x="382" y="188" fill="#fff">B</text>
  <text class="label" x="450" y="165">t₁</text><text class="label" x="442" y="72" fill="#d55e00">t₂e⁺ⁱφ</text>
  <text class="note" x="120" y="360">A/B onsite energies: +M and −M</text>
  <text class="note" x="120" y="392">gray: nearest neighbor; orange arrows: oriented next-nearest neighbor</text>
</svg>
