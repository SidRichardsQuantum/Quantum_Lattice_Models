<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc">
  <title id="title">Kitaev chain and doubled Nambu representation</title>
  <desc id="desc">A spinless chain with hopping, p-wave pairing, and chemical potential, together with particle and hole sectors of its Bogoliubov-de Gennes matrix.</desc>
  <defs>
    <style>
      .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}.hop{stroke:#0072b2;stroke-width:7}.pair{stroke:#d55e00;stroke-width:4;stroke-dasharray:10 7}
      .site{fill:#fff;stroke:#20242a;stroke-width:3}.particle{fill:#0072b2}.hole{fill:#e69f00}
      .block{fill:#fff;stroke:#6b7280;stroke-width:2}.title{font:24px sans-serif;font-weight:700;fill:#20242a}
      .label{font:20px sans-serif;fill:#20242a}.note{font:17px sans-serif;fill:#4b5563}
    </style>
  </defs>
  <rect width="1000" height="470" fill="#fff"/>
  <rect class="panel" x="35" y="35" width="930" height="190" rx="18"/>
  <text class="title" x="65" y="76">Spinless p-wave Kitaev chain</text>
  <g class="hop">
    <line x1="125" y1="145" x2="295" y2="145"/><line x1="295" y1="145" x2="465" y2="145"/>
    <line x1="465" y1="145" x2="635" y2="145"/><line x1="635" y1="145" x2="805" y2="145"/>
  </g>
  <g class="pair">
    <path d="M125 128 Q210 78 295 128"/><path d="M295 128 Q380 78 465 128"/>
    <path d="M465 128 Q550 78 635 128"/><path d="M635 128 Q720 78 805 128"/>
  </g>
  <g>
    <circle class="site" cx="125" cy="145" r="20"/><circle class="site" cx="295" cy="145" r="20"/>
    <circle class="site" cx="465" cy="145" r="20"/><circle class="site" cx="635" cy="145" r="20"/>
    <circle class="site" cx="805" cy="145" r="20"/>
  </g>
  <text class="label" x="192" y="174" fill="#0072b2">hopping −t</text>
  <text class="label" x="495" y="105" fill="#d55e00">pairing ±Δ</text>
  <text class="note" x="830" y="140">onsite</text><text class="label" x="830" y="165">−μ</text>
  <text class="note" x="65" y="205">Δ couples neighboring creation/annihilation amplitudes; its orientation enforces p-wave antisymmetry.</text>

  <rect class="panel" x="35" y="250" width="930" height="180" rx="18"/>
  <text class="title" x="65" y="290">BdG matrix in the Nambu basis Ψ = (c₀,…,cₙ₋₁,c₀†,…,cₙ₋₁†)ᵀ</text>
  <rect class="block" x="145" y="315" width="145" height="80"/><rect class="block" x="290" y="315" width="145" height="80"/>
  <rect class="block" x="145" y="395" width="145" height="0"/><rect class="block" x="290" y="395" width="145" height="0"/>
  <rect x="145" y="355" width="290" height="40" fill="#fff" stroke="#6b7280" stroke-width="2"/>
  <rect x="145" y="315" width="145" height="80" fill="#e8f3f9" stroke="#6b7280" stroke-width="2"/>
  <rect x="290" y="315" width="145" height="80" fill="#fff3df" stroke="#6b7280" stroke-width="2"/>
  <line x1="145" y1="355" x2="435" y2="355" stroke="#6b7280" stroke-width="2"/>
  <line x1="290" y1="315" x2="290" y2="395" stroke="#6b7280" stroke-width="2"/>
  <text class="label" x="197" y="346">A</text><text class="label" x="350" y="346">Δ</text>
  <text class="label" x="190" y="384">−Δ*</text><text class="label" x="337" y="384">−A*</text>
  <circle class="particle" cx="540" cy="335" r="15"/><text class="label" x="568" y="342">particle sector c</text>
  <circle class="hole" cx="540" cy="380" r="15"/><text class="label" x="568" y="387">hole sector c†</text>
  <text class="note" x="735" y="338">dimension: 2N</text>
  <text class="note" x="735" y="374">eigenvalues pair as ±E</text>
  <text class="note" x="735" y="405">not a 2ᴺ many-body matrix</text>
</svg>
