<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">Two-leg Heisenberg ladder</title>
  <desc id="desc">Two chains coupled by leg interactions and vertical rung interactions.</desc>
  <defs>
    <style>
      .leg{stroke:#0072b2;stroke-width:7}.rung{stroke:#d55e00;stroke-width:7}
      .site{fill:#fff;stroke:#20242a;stroke-width:4}
      .label{font:22px sans-serif;fill:#20242a}.note{font:18px sans-serif;fill:#4b5563}
    </style>
  </defs>
  <rect width="900" height="300" fill="#fff"/>
  <g>
    <line class="leg" x1="120" y1="80" x2="780" y2="80"/>
    <line class="leg" x1="120" y1="220" x2="780" y2="220"/>
    <line class="rung" x1="120" y1="80" x2="120" y2="220"/>
    <line class="rung" x1="285" y1="80" x2="285" y2="220"/>
    <line class="rung" x1="450" y1="80" x2="450" y2="220"/>
    <line class="rung" x1="615" y1="80" x2="615" y2="220"/>
    <line class="rung" x1="780" y1="80" x2="780" y2="220"/>
  </g>
  <g>
    <circle class="site" cx="120" cy="80" r="18"/><circle class="site" cx="285" cy="80" r="18"/>
    <circle class="site" cx="450" cy="80" r="18"/><circle class="site" cx="615" cy="80" r="18"/>
    <circle class="site" cx="780" cy="80" r="18"/><circle class="site" cx="120" cy="220" r="18"/>
    <circle class="site" cx="285" cy="220" r="18"/><circle class="site" cx="450" cy="220" r="18"/>
    <circle class="site" cx="615" cy="220" r="18"/><circle class="site" cx="780" cy="220" r="18"/>
  </g>
  <text class="label" x="375" y="45">Jleg</text><text class="label" x="465" y="158">Jrung</text>
  <text class="note" x="34" y="87">leg 1</text><text class="note" x="34" y="227">leg 2</text>
  <text class="note" x="365" y="285">rung index →</text>
</svg>
