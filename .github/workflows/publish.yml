name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Test and build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,pennylane]"

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(
            python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])'
          )"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag version $tag_version does not match pyproject.toml version $package_version."
            exit 1
          fi

      - name: Check formatting
        run: python -m black --check .

      - name: Lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -q

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/quantum-lattice-models/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
